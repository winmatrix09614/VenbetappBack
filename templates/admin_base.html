<!DOCTYPE html>
<html lang="ru" data-bs-theme="light"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Venbet CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Стили, которые адаптируются под темную/светлую тему */
        body { transition: background-color 0.3s ease; }
        .sidebar { background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; }
        .sidebar a { color: #a0a6b5; text-decoration: none; padding: 12px 15px; display: block; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #2d3343; color: white; }
        .content { padding: 25px; }
        
        /* Стили для свитчера темы */
        .theme-switch { cursor: pointer; padding: 10px; color: #a0a6b5; text-align: center; border-top: 1px solid #2d3343; margin-top: auto; }
        .theme-switch:hover { color: white; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3 shadow-lg z-3">
            <h4 class="text-white fw-bold mb-4 text-center">🎯 Venbet<span class="text-primary">CRM</span></h4>
            <a href="/dashboard"><i class="bi bi-people me-2"></i> Пользователи</a>
            <a href="/logs"><i class="bi bi-clock-history me-2"></i> Логи AI</a>
            
            <a href="/admin/logout" class="text-danger mt-4"><i class="bi bi-box-arrow-left me-2"></i> Выйти</a>
            
            <div class="theme-switch mt-auto" onclick="toggleTheme()">
                <i class="bi bi-moon-stars" id="themeIcon"></i> <span id="themeText">Темная тема</span>
            </div>
        </div>
        
        <div class="col-md-10 content bg-body-tertiary">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Скрипт для сохранения и переключения темной темы
    function setTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('theme', theme);
        const icon = document.getElementById('themeIcon');
        const text = document.getElementById('themeText');
        if(theme === 'dark') {
            icon.className = 'bi bi-sun';
            text.innerText = 'Светлая тема';
        } else {
            icon.className = 'bi bi-moon-stars';
            text.innerText = 'Темная тема';
        }
    }

    function toggleTheme() {
        const current = localStorage.getItem('theme') || 'light';
        setTheme(current === 'light' ? 'dark' : 'light');
    }

    // Применяем при загрузке
    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);
</script>
</body>
</html>
