<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Venbet CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #000000; /* Глубокий черный как в приложении */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background-color: #1c1c1e; /* Темно-серый цвет карточек iOS */
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2c2c2e;
        }
        .brand-text { color: #ffffff; font-weight: 800; letter-spacing: 1px; }
        .brand-accent { color: #ff8c00; } /* Фирменный оранжевый из VENBET AI */
        .form-control {
            background-color: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
        }
        .form-control:focus {
            background-color: #2c2c2e;
            border-color: #ff8c00;
            box-shadow: 0 0 0 0.25rem rgba(255, 140, 0, 0.25);
            color: white;
        }
        .btn-login {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="mb-4">
            <i class="bi bi-lightning-charge-fill" style="font-size: 2rem; color: #ff8c00;"></i>
            <h3 class="brand-text mt-2">VENBET <span class="brand-accent">CRM</span></h3>
            <p class="text-muted small">Панель управления персоналом</p>
        </div>
        <form method="post">
            <div class="mb-3 text-start">
                <input type="text" name="username" class="form-control" placeholder="Логин" required>
            </div>
            <div class="mb-4 text-start">
                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn btn-login">Продолжить <i class="bi bi-arrow-right ms-1"></i></button>
        </form>
    </div>
</body>
</html>
